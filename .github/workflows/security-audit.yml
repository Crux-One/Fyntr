name: Security Audit

on:
  push:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".github/workflows/**"

permissions:
  contents: read
  checks: write

jobs:
  security-audit:
    name: Audit Rust dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Audit dependencies
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ github.token }}
