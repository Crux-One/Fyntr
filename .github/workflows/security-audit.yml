name: Security Audit

on:
  schedule:
    - cron: "0 0 1 * *"
  push:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".github/workflows/**"

permissions:
  contents: read
  checks: write
  issues: write

jobs:
  security-audit:
    name: Audit Rust dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Audit dependencies
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ github.token }}
