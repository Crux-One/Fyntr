name: Betterleaks Scan

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main, develop]

permissions:
  contents: read

jobs:
  scan:
    name: Run Betterleaks scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Betterleaks
        run: |
          docker run --rm \
            -e GIT_CONFIG_COUNT=1 \
            -e GIT_CONFIG_KEY_0=safe.directory \
            -e GIT_CONFIG_VALUE_0=/work \
            -v "$PWD:/work" \
            -w /work \
            ghcr.io/betterleaks/betterleaks:v1.4.0@sha256:2ffed1b824e1fbd7a206eef6da75ce7ebf0abde5525301643fe53e03730032d6 \
            git .
